# Repo-local Codex defaults for codex-plugin-cc.
# Keep provider/model choices in the user's global config. This file only sets the
# execution posture expected for this repository.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# GitHub workflows in this repo rely on gh for PR creation, checks, and API
# verification. Keep network enabled so gh behaves the same inside Codex as it
# does in neighboring Claude sessions.
network_access = true

[projects."/home/vasetskiy/work/codex-cc"]
trust_level = "trusted"
